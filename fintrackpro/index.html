<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- ================= HEADER ================= -->

        <header>

            <div class="logo">

                <h1>
                    <i class="fa-solid fa-wallet"></i>
                    FinTrack Pro
                </h1>

                <p>Track every rupee wisely</p>

            </div>

            <div class="profile">

                <span id="userName">
                    Welcome 👋
                </span>

                <button id="themeBtn">
                    <i class="fa-solid fa-moon"></i>
                </button>

            </div>

        </header>

        <!-- ================= BALANCE ================= -->

        <section class="balance-card">

            <h3>Total Balance</h3>

            <h1 id="balance">
                ₹0.00
            </h1>

            <p>Your Current Balance</p>

        </section>

        <!-- ================= SUMMARY ================= -->

        <section class="summary">

            <div class="card income">

                <i class="fa-solid fa-arrow-trend-up"></i>

                <h3>Income</h3>

                <h2 id="income">
                    ₹0
                </h2>

            </div>

            <div class="card expense">

                <i class="fa-solid fa-arrow-trend-down"></i>

                <h3>Expense</h3>

                <h2 id="expense">
                    ₹0
                </h2>

            </div>

        </section>

        <!-- ================= ADD TRANSACTION ================= -->

        <section class="form-card">

            <h2>
                Add Transaction
            </h2>

            <form id="transactionForm">

                <input
                    type="text"
                    id="title"
                    placeholder="Title"
                    required>

                <input
                    type="number"
                    id="amount"
                    placeholder="Amount"
                    required>

                <select id="type">

                    <option value="income">
                        Income
                    </option>

                    <option value="expense">
                        Expense
                    </option>

                </select>

                <select id="category">

                    <option>Salary</option>

                    <option>Food</option>

                    <option>Travel</option>

                    <option>Shopping</option>

                    <option>Bills</option>

                    <option>Health</option>

                    <option>Entertainment</option>

                    <option>Investment</option>

                    <option>Other</option>

                </select>

                <button type="submit">

                    <i class="fa-solid fa-plus"></i>

                    Add Transaction

                </button>

            </form>

        </section>

        <!-- ================= FILTER ================= -->

        <section class="filter-section">

            <button class="filter active"
                data-filter="all">
                All
            </button>

            <button class="filter"
                data-filter="income">
                Income
            </button>

            <button class="filter"
                data-filter="expense">
                Expense
            </button>

            <input
                type="text"
                id="search"
                placeholder="Search Transaction">

        </section>

        <!-- ================= HISTORY ================= -->

        <section class="history">

            <div class="history-header">

                <h2>
                    Transaction History
                </h2>

            </div>

            <ul id="transactionList">

            </ul>

        </section>

        <!-- ================= CHART ================= -->

        <section class="chart-card">

            <h2>
                Cash Flow
            </h2>

            <canvas id="financeChart">

            </canvas>

        </section>

        <!-- ================= SETTINGS ================= -->

        <section class="settings">

            <h2>

                Settings

            </h2>

            <div class="setting">

                <label>
                    Name
                </label>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter your name">

            </div>

            <div class="setting">

                <label>
                    Currency
                </label>

                <select id="currency">

                    <option value="INR">
                        ₹ INR
                    </option>

                    <option value="USD">
                        $ USD
                    </option>

                    <option value="EUR">
                        € EUR
                    </option>

                    <option value="GBP">
                        £ GBP
                    </option>

                    <option value="JPY">
                        ¥ JPY
                    </option>

                </select>

            </div>

            <button id="saveProfile">

                Save Settings

            </button>

            <button id="resetData">

                Reset All Data

            </button>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
